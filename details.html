<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Cars Collection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
    padding:40px;
}

/* TITLE */

.title{
    text-align:center;
    font-size:40px;
    margin-bottom:40px;
    font-weight:bold;
    letter-spacing:2px;
}

/* COLLECTION */

.collection{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

/* CARD */

.card{
    background:#0d0d0d;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    margin-top:15px;
    font-size:20px;
}

.price{
    margin:10px 0;
    color:#d9d9d9;
    font-size:18px;
}

/* BUTTON */

.btn{
    display:inline-block;
    padding:10px 20px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:25px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#bdbdbd;
}
/* BACK BUTTON */

.back-btn{
    display:inline-block;
    margin-bottom:30px;
    padding:10px 20px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:25px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#bdbdbd;
}
/* BACK BUTTON */


/* RESPONSIVE */

@media(max-width:900px){

    .collection{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:600px){

    .collection{
        grid-template-columns:1fr;
    }

    .title{
        font-size:28px;
    }

}

</style>
</head>

<body>
<a href="index.html" class="back-btn">
    ← Back Home
</a>
<h1 class="title">OUR COLLECTION</h1>

<div class="collection">

    <!-- CARD 1 -->

    <div class="card">
        <img src="Capture d'écran 2026-04-27 004023.png">

        <h3>Mercedes AMG GT R</h3>

        <p class="price">4200 MAD/day</p>

        <a href="#"
        class="btn"
        onclick="bookCar('Mercedes AMG GT R',4200)">
        Book Now
        </a>
    </div>

    <!-- CARD 2 -->

    <div class="card">
        <img src="Capture d'écran 2026-04-30 210520.png">

        <h3>Mercedes Benz E63</h3>

        <p class="price">5000 MAD/day</p>

        <a href="#"
        class="btn"
        onclick="bookCar('Mercedes Benz E63',5000)">
        Book Now
        </a>
    </div>

    <!-- CARD 3 -->

    <div class="card">
        <img src="Capture d'écran 2026-05-02 164302.png">

        <h3>Range Rover 2024</h3>

        <p class="price">1500 MAD/day</p>

        <a href="#"
        class="btn"
        onclick="bookCar('Range Rover 2024',1500)">
        Book Now
        </a>
    </div>

    <!-- CARD 4 -->

    <div class="card">
        <img src="Capture d'écran 2026-05-02 170249.png">

        <h3>Audi RS Q8</h3>

        <p class="price">4500 MAD/day</p>

        <a href="#"
        class="btn"
        onclick="bookCar('Audi RS Q8',4500)">
        Book Now
        </a>
    </div>

    <!-- CARD 5 -->

    <div class="card">
        <img src="Capture d'écran 2026-05-02 171000.png">

        <h3>BMW M2 CS</h3>

        <p class="price">10000 MAD/day</p>

        <a href="#"
        class="btn"
        onclick="bookCar('BMW M2 CS',10000)">
        Book Now
        </a>
    </div>

    <!-- CARD 6 -->

    <div class="card">
        <img src="Capture d'écran 2026-05-02 200143.png">

        <h3>Tesla Model 3</h3>

        <p class="price">500 MAD/day</p>

        <a href="#"
        class="btn"
        onclick="bookCar('Tesla Model 3',500)">
        Book Now
        </a>
    </div>

</div>

<script>

function bookCar(carName, price){

    let confirmBooking = confirm(
        "Do you want to reserve " + carName +
        " for " + price + " MAD/day ?"
    );

    if(confirmBooking){

        alert(
            "Reservation completed successfully for : " +
            carName
        );

    }else{

        alert("Reservation canceled");

    }
}

</script>

</body>
</html>
